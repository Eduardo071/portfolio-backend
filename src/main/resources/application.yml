server:
  port: ${PORT:8080}

spring:
  application:
    name: portfolio
  threads:
    virtual:
      enabled: true   # Java 21 virtual threads

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

resend:
  api-key: ${RESEND_API_KEY:}

portfolio:
  contact:
    to-email: ${CONTACT_TO_EMAIL:eduardoborges.developer@gmail.com}
  cors:
    allowed-origins: ${CORS_ORIGIN_1:http://localhost:4200},${CORS_ORIGIN_2:https://portfolio-eb.vercel.app}
